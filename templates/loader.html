<!doctype html>
<html lang="es">

<head>
<meta charset="utf-8">
<title>Procesando actividad</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f5f7fb;
}

.loader{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.texto{
margin-top:20px;
font-size:18px;
color:#2c3e50;
}

</style>

</head>

<body>

<div class="loader">

<div class="spinner-border text-primary"
style="width:4rem;height:4rem;"></div>

<div id="mensaje" class="texto">
Cargando tu actividad...
</div>

</div>

<script>

const mensajes = [
"Cargando tu actividad...",
"Conectando con Moodle...",
"Recuperando tus respuestas...",
"Analizando tu reflexión pedagógica...",
"Generando retroalimentación personalizada..."
]

let i=0

setInterval(()=>{

document.getElementById("mensaje").innerText=mensajes[i]

i++

if(i>=mensajes.length){
i=0
}

},10000)


/* Redirigir al backend real */

const params = window.location.search

setTimeout(()=>{

window.location.href="/procesar_feedback"+params

},1000)

</script>

</body>
</html>
